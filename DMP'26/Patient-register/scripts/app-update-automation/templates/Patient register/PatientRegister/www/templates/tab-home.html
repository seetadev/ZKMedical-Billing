        {"numsheets":10,"currentid":"sheet1","currentname":"sheet8","sheetArr":{"sheet1":{"sheetstr":{"savestr":"version:1.5\ncell:C3:t:Introduction:b:1:1:1:1:f:3:cf:1:colspan:2\ncell:C5:t:Invoice App is a one stop solution for small and large business owners looking for an on field invoicing app. A feature packed app that helps you generate, modify, organize and export billing information to your customers and partners. The intuitive interface allows you to choose from suitable templates and produce invoices. :colspan:2\ncell:C6:colspan:2\ncell:C7:t:The different sections and features of the app has been described as follows -:bg:1:colspan:2\ncell:C9:t:Sections/Features:b:1:1:1:1:f:2:cf:1\ncell:D9:t:Description:b:1:1:1:1:f:2:cf:1\ncell:B10:b::1::\ncell:C10:t:Professional Templates:b::1::1\ncell:D10:t:Offers you with a range of templates for pro forma as well as service and/or goods invoices for business needs. :b::1::1\ncell:E10:b::::1\ncell:B11:b::1::\ncell:C11:b::1::1\ncell:D11:t:Pro forma invoice allows you to enter shipping information with templates suitable for both domestic and international trade. In Pro Forma Invoice, the entries are by default made taxable by entering \"X\" in the Tax Field. If you don't wish to include the Tax component for an entry/entries, you may do so by removing \"X\" symbol in the respective Tax field.:b::1::1\ncell:E11:b::::1\ncell:B12:b::1::\ncell:C12:b::1::1\ncell:D12:t:Simply add the basic information about you and your clients along with specifics of the order.Taxes and totals are automatically calculated for you. So there's no extra work. Just add your invoice items and Invoice App does the rest. :b::1::1\ncell:E12:b::::1\ncell:B13:b::1::\ncell:C13:b::1::1\ncell:D13:b::1::1\ncell:E13:b::::1\ncell:B14:b::1::\ncell:C14:t:Calendar:b::1::1\ncell:D14:t:An yearly calendar is provided to enable you to keep a log of key notes related to the invoices.:b::1::1\ncell:E14:b::::1\ncell:B15:b::1::\ncell:C15:b::1::1\ncell:D15:b::1::1\ncell:E15:b::::1\ncell:B16:b::1::\ncell:C16:t:Urgent/ Important Contacts List (contacts):b::1::1\ncell:D16:t:Add contact details like client name, phone, email, street address, city and ZIP code.:b::1::1\ncell:E16:b::::1\ncell:B17:b::1::\ncell:E17:b::::1\ncell:C18:b:1:::\ncell:D18:b:1:::\ncell:C19:t:Entering data in the file can be done by tapping on the cell. Tap and add the text.:colspan:2\ncell:C21:t:Locally save your invoices, meeting agenda and activities as a file, and re-use it with minimal changes. Simply tap e-mail to send it to your clients, advisers, partners and stakeholders and get feedback from them. You can also email it to yourself or print it.:bg:1:colspan:2\ncell:C22:colspan:2\ncell:C23:t:If you need any further assistance in using the Invoice App, or would like to see some new features in the future versions of the application, please write to us at marketing@tickervalue.com You can also meet us on Skype by sending a contact request to aspiring.investments.:colspan:2\ncol:A:w:12\ncol:B:w:13\ncol:C:w:181\ncol:D:w:457\nsheet:c:5:r:23:font:1:layout:1\nborder:1:1px solid rgb(0,0,0)\ncellformat:1:center\ncolor:1:rgb(233,233,233)\nfont:1:* 10pt arial,helvetica,sans-serif\nfont:2:* 12pt arial,helvetica,sans-serif\nfont:3:* 16pt *\nlayout:1:padding:4px 4px 4px 4px;vertical-align:*;\n"},"name":"sheet8","hidden":"0"},"sheet2":{"sheetstr":{"savestr":"version:1.5\ncell:A1:f:1\ncell:B1:l:1:f:1\ncell:C1:l:1:f:1\ncell:D1:l:1:f:1\ncell:E1:l:1:f:1\ncell:F1:l:1:f:1\ncell:G1:l:1:f:1\ncell:H1:f:1\ncell:A2:l:1:f:1\ncell:B2:t:INVOICE:b:1:1:1:1:f:4:cf:1:colspan:6\ncell:C2:t::l:1:f:1\ncell:D2:t::l:1:f:1\ncell:E2:t::l:1:f:1\ncell:F2:t::l:1:f:1\ncell:G2:t::l:1:f:1\ncell:H2:f:1\ncell:A3:b::1:::l:3:f:1\ncell:B3:b::1::1:l:3:f:1:colspan:6\ncell:C3:l:1:f:1:bg:2\ncell:D3:l:1:f:1:bg:2\ncell:E3:l:1:f:1:bg:2\ncell:F3:l:1:f:1:bg:2\ncell:G3:l:3:f:1:bg:2\ncell:H3:b::::1:f:1\ncell:A4:b::1:::l:3:f:1\ncell:B4:b::::1:l:3:f:1\ncell:C4:t:INVOICE # \\c:f:3:cf:2\ncell:D4:b:::1::f:3:cf:2\ncell:E4:f:
