name: ZK Circuits

on:
  push:
    paths:
      - "zk_validate_verify/circuits/**"
      - "zk_validate_verify/inputs/**"
  pull_request:
    paths:
      - "zk_validate_verify/circuits/**"
      - "zk_validate_verify/inputs/**"

jobs:
  compile-and-test:
    name: Compile circuits + generate proof
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Circom binary
        id: cache-circom
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/circom
          key: circom-2.1.8

      - name: Install Circom
        if: steps.cache-circom.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/iden3/circom.git /tmp/circom
          cd /tmp/circom
          cargo build --release
          cargo install --path .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zk_validate_verify/package-lock.json

      - name: Install JS dependencies
        run: npm ci
        working-directory: zk_validate_verify

      - name: Cache Powers of Tau
        uses: actions/cache@v4
        with:
          path: zk_validate_verify/build/pot15_final.ptau
          key: ptau-hermez-15

      - name: Compile medical_invoice circuit
        working-directory: zk_validate_verify
        run: |
          mkdir -p build outputs
          circom circuits/medical_invoice.circom \
            --r1cs --wasm --sym \
            -o build/
          echo "Constraint count:"
          npx snarkjs r1cs info build/medical_invoice.r1cs

      - name: Run trusted setup (Phase 2)
        working-directory: zk_validate_verify
        run: |
          if [ ! -f build/pot15_final.ptau ]; then
            wget -q https://hermez.s3-eu-west-1.amazonaws.com/powersOfTau28_hez_final_15.ptau \
              -O build/pot15_final.ptau
          fi
          npx snarkjs groth16 setup \
            build/medical_invoice.r1cs \
            build/pot15_final.ptau \
            build/medical_invoice_0000.zkey
          echo "test entropy" | npx snarkjs zkey contribute \
            build/medical_invoice_0000.zkey \
            build/medical_invoice_final.zkey \
            --name="CI runner" -v
          npx snarkjs zkey export verificationkey \
            build/medical_invoice_final.zkey \
            build/verification_key.json

      - name: Generate test proof
        working-directory: zk_validate_verify
        run: |
          node build/medical_invoice_js/generate_witness.js \
            build/medical_invoice_js/medical_invoice.wasm \
            inputs/invoice_sample.json \
            build/witness.wtns
          npx snarkjs groth16 prove \
            build/medical_invoice_final.zkey \
            build/witness.wtns \
            outputs/proof.json \
            outputs/public.json
          npx snarkjs groth16 verify \
            build/verification_key.json \
            outputs/public.json \
            outputs/proof.json
          echo "Proof verification: OK"

      - name: Check is_valid output
        working-directory: zk_validate_verify
        run: |
          IS_VALID=$(node -e "
            const pub = require('./outputs/public.json');
            console.log(pub[1]);
          ")
          if [ "$IS_VALID" != "1" ]; then
            echo "ERROR: is_valid output is $IS_VALID, expected 1"
            exit 1
          fi
          echo "Circuit output is_valid = 1 — PASS"

      - name: Export Solidity verifier
        working-directory: zk_validate_verify
        run: |
          npx snarkjs zkey export solidityverifier \
            build/medical_invoice_final.zkey \
            fvm-contracts/contracts/MedicalInvoiceVerifier.sol
          echo "Verifier exported"

      - name: Upload circuit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: circuit-artifacts
          path: |
            zk_validate_verify/build/medical_invoice_final.zkey
            zk_validate_verify/build/verification_key.json
            zk_validate_verify/fvm-contracts/contracts/MedicalInvoiceVerifier.sol
            zk_validate_verify/outputs/proof.json
          retention-days: 7
