name: API and SDK

on:
  push:
    paths:
      - "zk_validate_verify/api/**"
      - "zk_validate_verify/sdk/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "zk_validate_verify/api/**"
      - "zk_validate_verify/sdk/**"

jobs:
  test-api:
    name: API endpoint tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zk_validate_verify/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: zk_validate_verify/api

      - name: Run Jest tests
        run: npm test -- --coverage --forceExit
        working-directory: zk_validate_verify/api
        env:
          NODE_ENV:       test
          API_KEY_SECRET: test_key_for_ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: zk_validate_verify/api/coverage

  build-sdk:
    name: Build and typecheck TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        run: npm ci && npm run build
        working-directory: zk_validate_verify/sdk

      - name: Verify types compile
        run: npx tsc --noEmit
        working-directory: zk_validate_verify/sdk

  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    needs: [test-api, build-sdk]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build SDK
        run: npm ci && npm run build
        working-directory: zk_validate_verify/sdk

      - name: Check if version changed
        id: version-check
        run: |
          PUBLISHED=$(npm show @op-medicine/billing-sdk version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./zk_validate_verify/sdk/package.json').version")
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing version $LOCAL (was $PUBLISHED)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --access public
        working-directory: zk_validate_verify/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
